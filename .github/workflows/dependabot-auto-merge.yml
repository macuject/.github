name: Dependabot Auto-Merge

# Reusable workflow. Auto-merges minor/patch Dependabot PRs only after
# the caller's CI workflow (`inputs.workflow_name`, default `CI`) has
# completed with `conclusion=success` on the PR head commit.
#
# Triggered (in callers) by `workflow_run` on the CI workflow completing,
# and by `pull_request_review` on review submission, so the merge fires
# whichever signal arrives last: CI going green or the human approval.
#
# Performs the merge using ORG_TEAM_MEMBERS rather than GITHUB_TOKEN so
# that the resulting `pull_request: closed` event triggers downstream
# workflows (specifically update-jira-issue.yml, which sets fixVersion
# and transitions the linked Jira issue to Done). Merges performed by
# GITHUB_TOKEN do not create new workflow runs — see
# https://docs.github.com/en/actions/using-workflows/triggering-a-workflow#triggering-a-workflow-from-a-workflow
#
# A second job, `escalate-on-ci-failure`, handles the inverse case: when CI
# *fails* on a Dependabot PR that automation already auto-approved (Claude
# labelled it `claude-auto-merge-candidate` and posted an auto-approval review
# before CI completed), the merge job above is a no-op and the PR would sit
# orphaned — approved by a bot, red CI, no human looking. This job dismisses the
# stale approval and routes the PR to a human reviewer. It only runs when the
# caller passes `team_slug`, so consumers opt in by adding that input to their
# wrapper (no breakage for callers that haven't adopted it yet).

on:
  workflow_call:
    inputs:
      workflow_name:
        description: >-
          Name of the CI workflow whose latest run on the PR head SHA must
          have `conclusion=success` before a merge is allowed. The caller
          should also list this workflow under `on.workflow_run.workflows`.
          Defaults to `CI` to match `macuject/web`; `macuject/platform` and
          other consumers with a differently named workflow must override.
        type: string
        default: CI
      team_slug:
        description: >-
          GitHub team (slug under `macuject`) whose members are eligible
          reviewers when the `escalate-on-ci-failure` job routes an
          auto-approved Dependabot PR to a human after CI fails. Optional:
          when empty (the default) the escalation job is skipped entirely, so
          existing callers keep working until they opt in by setting this.
          e.g. `web`, `Platform`.
        type: string
        default: ""
      autofix_grace_seconds:
        description: >-
          Grace window (seconds) the `escalate-on-ci-failure` job waits for a
          newer commit to land on the PR head before escalating, letting an
          in-flight auto-fix workflow (e.g. a job that regenerates Sorbet RBIs
          and pushes them back) supersede the failing run. While the head SHA
          keeps advancing the failure is treated as transient, not terminal.
          Optional: defaults to 0, which means no wait and behaviour identical
          to before this input existed. Independent of this window, a failing
          run whose commit is no longer the PR head is always treated as stale
          and skipped.
        type: number
        default: 0
    secrets:
      ORG_TEAM_MEMBERS:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Only run on CI success (workflow_run for a PR) or review submission.
    # A failed CI run or a non-PR workflow_run is a no-op.
    if: >-
      (github.event_name == 'workflow_run' &&
         github.event.workflow_run.conclusion == 'success' &&
         github.event.workflow_run.event == 'pull_request') ||
      github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.ORG_TEAM_MEMBERS }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            NUM=$(jq -r '.workflow_run.pull_requests[0].number // empty' < "$GITHUB_EVENT_PATH")
          else
            NUM='${{ github.event.pull_request.number }}'
          fi
          if [ -z "$NUM" ] || [ "$NUM" = "null" ]; then
            echo "No PR associated with this event; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$NUM" >> "$GITHUB_OUTPUT"

      - name: Gate on author, review, mergeable, CI Gate
        if: steps.pr.outputs.skip != 'true'
        id: gate
        env:
          GH_TOKEN: ${{ secrets.ORG_TEAM_MEMBERS }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          DATA=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json author,reviewDecision,mergeable,state,headRefOid)
          AUTHOR=$(jq -r '.author.login' <<<"$DATA")
          REVIEW=$(jq -r '.reviewDecision' <<<"$DATA")
          MERGEABLE=$(jq -r '.mergeable' <<<"$DATA")
          STATE=$(jq -r '.state' <<<"$DATA")
          SHA=$(jq -r '.headRefOid' <<<"$DATA")

          echo "author=$AUTHOR review=$REVIEW mergeable=$MERGEABLE state=$STATE sha=$SHA"

          if [ "$AUTHOR" != "app/dependabot" ]; then
            echo "Not a Dependabot PR; skipping."
            exit 0
          fi
          if [ "$STATE" != "OPEN" ]; then
            echo "PR not open (state=$STATE); skipping."
            exit 0
          fi

          # reviewDecision may lag behind the actual review submission by
          # several seconds due to GitHub API eventual consistency. When the
          # trigger is pull_request_review we know a review was just submitted,
          # so retry a few times before giving up. For workflow_run triggers
          # the review happened earlier, so a single check suffices.
          if [ "$REVIEW" != "APPROVED" ]; then
            if [ "${{ github.event_name }}" = "pull_request_review" ]; then
              echo "reviewDecision not yet APPROVED; retrying (eventual consistency)..."
              for i in 1 2 3; do
                sleep 5
                REVIEW=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
                  --json reviewDecision --jq '.reviewDecision')
                echo "  attempt $i: reviewDecision=$REVIEW"
                if [ "$REVIEW" = "APPROVED" ]; then
                  break
                fi
              done
            fi
            if [ "$REVIEW" != "APPROVED" ]; then
              echo "PR not approved (reviewDecision=$REVIEW); skipping."
              exit 0
            fi
          fi

          # mergeable is computed asynchronously by GitHub and briefly returns
          # UNKNOWN after the head changes or CI completes (the merge state is
          # recomputed in the background). When the workflow_run trigger fires
          # right after CI finishes, we often hit this window. Retry on UNKNOWN
          # only — CONFLICTING is terminal, retrying won't help.
          if [ "$MERGEABLE" = "UNKNOWN" ]; then
            echo "mergeable=UNKNOWN; retrying (eventual consistency)..."
            for i in 1 2 3 4 5; do
              sleep 5
              MERGEABLE=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
                --json mergeable --jq '.mergeable')
              echo "  attempt $i: mergeable=$MERGEABLE"
              if [ "$MERGEABLE" != "UNKNOWN" ]; then
                break
              fi
            done
          fi
          if [ "$MERGEABLE" != "MERGEABLE" ]; then
            echo "PR not mergeable (mergeable=$MERGEABLE); skipping."
            exit 0
          fi

          # Verify the latest run of the caller-specified CI workflow on
          # the PR head SHA finished `success`. Both triggers need this:
          # workflow_run guarantees one successful run existed, but the head
          # SHA may have moved since; pull_request_review has no CI info and
          # must look it up. Using the workflow's overall conclusion lets us
          # support consumers without a dedicated aggregator check job — the
          # conclusion is itself the aggregate (failure if any required job
          # failed, success if all succeeded or were skipped).
          WORKFLOW_NAME='${{ inputs.workflow_name }}'
          CONCL=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$SHA&event=pull_request" \
            --jq "[.workflow_runs[] | select(.name == \"$WORKFLOW_NAME\")] | sort_by(.run_started_at) | last | .conclusion // \"missing\"")
          if [ "$CONCL" != "success" ]; then
            echo "Workflow '$WORKFLOW_NAME' not success on $SHA (conclusion=$CONCL); skipping."
            exit 0
          fi

          echo "ok=true" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Determine update type from Dependabot commit metadata
        if: steps.gate.outputs.ok == 'true'
        id: metadata
        env:
          GH_TOKEN: ${{ secrets.ORG_TEAM_MEMBERS }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          # Dependabot commits embed metadata in the commit message body:
          #   update-type: version-update:semver-{patch,minor,major}
          # Grouped PRs contain multiple entries; the effective type is the
          # highest severity present (major > minor > patch).
          MSGS=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/commits" --paginate \
            --jq '.[].commit.message' | tr -d '\r')
          TYPES=$(grep -oE 'update-type: version-update:semver-(patch|minor|major)' <<<"$MSGS" \
            | awk -F'semver-' '{print $2}' | sort -u || true)

          # Dependabot omits the `update-type:` metadata line for *indirect*
          # (transitive) dependency bumps — the commit body only carries
          # `dependency-name`, `dependency-version`, and `dependency-type:
          # indirect` (see macuject/web#1835). Derive the classification from
          # the `Bumps [name](url) from X.Y.Z to A.B.C.` lines Dependabot
          # always emits, and union with any signal already extracted so
          # grouped PRs that mix direct and indirect entries pick the highest
          # severity across both. Pre-release/non-numeric version components
          # are skipped (rare for indirect deps; falls through to `unknown`).
          PAIRS=$(grep -oE 'Bumps .+ from [0-9]+\.[0-9]+\.[0-9]+ to [0-9]+\.[0-9]+\.[0-9]+' <<<"$MSGS" || true)
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            OLD=$(awk '{for(i=1;i<=NF;i++) if($i=="from"){print $(i+1); exit}}' <<<"$line")
            NEW=$(awk '{for(i=1;i<=NF;i++) if($i=="to"){print $(i+1); exit}}' <<<"$line")
            [[ "$OLD" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ && "$NEW" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || continue
            IFS=. read -r OM OI OP <<<"$OLD"
            IFS=. read -r NM NI NP <<<"$NEW"
            if [ "$NM" -gt "$OM" ]; then
              TYPES="$TYPES"$'\n'major
            elif [ "$NM" = "$OM" ] && [ "$NI" -gt "$OI" ]; then
              TYPES="$TYPES"$'\n'minor
            elif [ "$NM" = "$OM" ] && [ "$NI" = "$OI" ] && [ "$NP" -gt "$OP" ]; then
              TYPES="$TYPES"$'\n'patch
            fi
          done <<< "$PAIRS"
          TYPES=$(printf '%s\n' "$TYPES" | sort -u | grep -v '^$' || true)
          echo "Detected update types: $TYPES"
          if grep -qx major <<<"$TYPES"; then
            TYPE=major
          elif grep -qx minor <<<"$TYPES"; then
            TYPE=minor
          elif grep -qx patch <<<"$TYPES"; then
            TYPE=patch
          else
            TYPE=unknown
          fi
          echo "Effective update-type: $TYPE"
          echo "update-type=$TYPE" >> "$GITHUB_OUTPUT"

      - name: Merge minor/patch
        if: >-
          steps.metadata.outputs.update-type == 'minor' ||
          steps.metadata.outputs.update-type == 'patch'
        env:
          GH_TOKEN: ${{ secrets.ORG_TEAM_MEMBERS }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: gh pr merge --merge --repo "$GITHUB_REPOSITORY" "$PR_NUMBER"

  escalate-on-ci-failure:
    # Inverse of the merge job: when the caller's CI workflow completes with
    # `conclusion=failure` on a Dependabot PR that automation already
    # auto-approved, dismiss the stale approval and route the PR to a human.
    # Gated on `team_slug` so callers opt in (see header comment). Skipped for
    # CI successes and non-PR runs (the merge job handles successes).
    if: >-
      inputs.team_slug != '' &&
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          set -euo pipefail
          NUM=$(jq -r '.workflow_run.pull_requests[0].number // empty' < "$GITHUB_EVENT_PATH")
          if [ -z "$NUM" ] || [ "$NUM" = "null" ]; then
            echo "No PR associated with this event; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$NUM" >> "$GITHUB_OUTPUT"

      - name: Escalate to human reviewer
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.ORG_TEAM_MEMBERS }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
          TEAM_SLUG: ${{ inputs.team_slug }}
          FAILED_SHA: ${{ github.event.workflow_run.head_sha }}
          GRACE: ${{ inputs.autofix_grace_seconds }}
        run: |
          set -euo pipefail

          DATA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json author,state,labels,headRefOid)
          AUTHOR=$(jq -r '.author.login' <<<"$DATA")
          STATE=$(jq -r '.state' <<<"$DATA")
          LABELS=$(jq -c '[.labels[].name]' <<<"$DATA")
          CURRENT_SHA=$(jq -r '.headRefOid' <<<"$DATA")

          # Only act on open Dependabot PRs that automation took ownership of
          # (Claude applied the auto-merge candidate label) and that we have not
          # already escalated. The sentinel label makes this idempotent: a PR
          # whose CI fails repeatedly is escalated once, not on every red run.
          if [ "$AUTHOR" != "app/dependabot" ]; then
            echo "Not a Dependabot PR (author=$AUTHOR); skipping."; exit 0
          fi
          if [ "$STATE" != "OPEN" ]; then
            echo "PR not open (state=$STATE); skipping."; exit 0
          fi
          if ! jq -e 'index("claude-auto-merge-candidate")' <<<"$LABELS" >/dev/null; then
            echo "PR not an auto-merge candidate (automation never took ownership); skipping."
            exit 0
          fi
          if jq -e 'index("auto-merge-ci-failed")' <<<"$LABELS" >/dev/null; then
            echo "PR already escalated (auto-merge-ci-failed present); skipping."; exit 0
          fi

          # Stale-run / auto-fix guard. The failing run was for commit FAILED_SHA.
          # If the PR head has since moved on, a newer commit exists — pushed by a
          # human or by an auto-fix workflow — and that commit will produce its own
          # CI verdict (re-firing this job if it also fails). Escalating off the old
          # run would dismiss the approval and ping a human for a failure that has
          # already been superseded. When autofix_grace_seconds > 0 the caller has
          # an auto-fix that pushes asynchronously, so wait briefly for the head to
          # advance before deciding. With the default of 0 there is no wait and the
          # check below collapses to a single stale-vs-current comparison.
          if [ "${GRACE:-0}" -gt 0 ] && [ "$CURRENT_SHA" = "$FAILED_SHA" ]; then
            echo "Grace window ${GRACE}s: waiting for an auto-fix to supersede $FAILED_SHA..."
            elapsed=0
            while [ "$elapsed" -lt "$GRACE" ]; do
              sleep 15; elapsed=$((elapsed + 15))
              CURRENT_SHA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')
              if [ "$CURRENT_SHA" != "$FAILED_SHA" ]; then
                echo "Head advanced to $CURRENT_SHA after ${elapsed}s; auto-fix in flight."
                break
              fi
            done
          fi
          if [ -n "$FAILED_SHA" ] && [ "$CURRENT_SHA" != "$FAILED_SHA" ]; then
            echo "Failing run was on $FAILED_SHA but PR head is now $CURRENT_SHA; run is stale, skipping escalation."
            exit 0
          fi

          echo "CI failed on auto-approved Dependabot PR #$PR_NUMBER — escalating to human review."

          # 1. Dismiss the stale automated approval so the PR is no longer
          #    APPROVED. This prevents the merge job from ever merging on a
          #    stale approval if CI later goes green on a force-push, and forces
          #    a fresh human approval. There should be one APPROVED review (the
          #    org PAT's auto-approval); dismiss any that exist.
          REVIEW_IDS=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate \
            --jq '.[] | select(.state == "APPROVED") | .id')
          for id in $REVIEW_IDS; do
            echo "Dismissing stale approval review $id"
            gh api -X PUT "repos/$REPO/pulls/$PR_NUMBER/reviews/$id/dismissals" \
              -f message="Auto-approval dismissed: CI failed after auto-approval. This PR needs human review." \
              -f event=DISMISS >/dev/null
          done

          # 2. Assign a human reviewer from the caller's team, excluding the PR
          #    author. The author guard is defensive: a Dependabot PR's author
          #    is never a team member, but it keeps selection correct if a team
          #    member ever opens a PR that reaches this path.
          if ! MEMBERS=$(gh api "orgs/macuject/teams/$TEAM_SLUG/members" --jq '.[].login' 2>&1); then
            echo "::warning::Failed to fetch members of team '$TEAM_SLUG'"
            MEMBERS=""
          fi
          ELIGIBLE=$(grep -vxF "$AUTHOR" <<<"$MEMBERS" || true)
          SELECTED=$(grep -v '^$' <<<"$ELIGIBLE" | shuf -n 1 || true)
          if [ -n "$SELECTED" ]; then
            echo "Assigning $SELECTED as reviewer"
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-reviewer "$SELECTED"
          else
            echo "No eligible individual reviewer; requesting team '$TEAM_SLUG'"
            gh api -X POST "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" \
              --input - <<< "{\"team_reviewers\":[\"$TEAM_SLUG\"]}" \
              || echo "::warning::Failed to request team review"
          fi

          # 3. Comment, then 4. add the sentinel label (idempotency guard above).
          gh pr comment "$PR_NUMBER" --repo "$REPO" \
            --body "⚠️ Auto-merge cancelled: CI failed after this Dependabot PR was auto-approved. The automated approval has been dismissed and the PR routed to a human reviewer. Please review the CI failure and the changes before merging."

          gh label create "auto-merge-ci-failed" --repo "$REPO" \
            --color "B60205" \
            --description "Auto-merge cancelled because CI failed after auto-approval; escalated to human review" \
            --force >/dev/null 2>&1 || true
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "auto-merge-ci-failed"
